<script>
jQuery(document).ready(function($) {
  setTimeout(function() {
   
    var testimonialSlider = $('.elementskit-testimonial-slider');
    
    if (testimonialSlider.length) {
     
      $('.custom-progress-container').remove();
      
    
      testimonialSlider.after('<div class="custom-progress-container"><div class="custom-progress-bar"></div></div>');
      
     
      if (!$('#custom-progress-styles').length) {
        $('head').append(`
          <style id="custom-progress-styles">
            .custom-progress-container {
              width: 100%;
              background-color: rgba(128, 128, 128, 0.1); 
              height: 1.5px;
              margin-top: 20px;
              position: relative;
              border-radius: 2px;
            }
            .custom-progress-bar {
              position: absolute;
              left: 0;
              top: 0;
              height: 100%;
              background-color: rgba(255, 255, 255, 0.2); 
              border-radius: 2px;
              transition: width 0.4s ease-in-out;
            }
          </style>
        `);
      }
      
      // Count total slides
      var totalSlides = testimonialSlider.find('.elementskit-single-testimonial-slider').length;
      
      // Initial setup - start with first slide
      updateProgress(0, totalSlides);
      
      // Try to get Swiper instance
      var swiperContainer = testimonialSlider.find('.swiper-container');
      if (swiperContainer.length && typeof swiperContainer[0].swiper !== 'undefined') {
        // If Swiper is available
        var swiper = swiperContainer[0].swiper;
        
        // Update progress when slide changes
        swiper.on('slideChange', function() {
          updateProgress(swiper.activeIndex, totalSlides);
        });
      } else {
        // Fallback method using interval checking
        setInterval(function() {
          var activeSlide = testimonialSlider.find('.swiper-slide-active, .slick-active').index();
          if (activeSlide >= 0) {
            updateProgress(activeSlide, totalSlides);
          }
        }, 300);
      }
    }
  }, 1000);
  
  function updateProgress(currentIndex, totalSlides) {
    var progressPercent = ((currentIndex + 1) / totalSlides) * 100;
    $('.custom-progress-bar').css('width', progressPercent + '%');
  }
});
</script>				</div>
